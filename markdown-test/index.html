<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<script
			src="https://cdnjs.cloudflare.com/ajax/libs/markdown-it/13.0.2/markdown-it.js"
			integrity="sha512-2LtYcLGnCbAWz9nDIrfG2pHFiFu9n+3oGecQlzLuYsLgen/oxiYscGWnDST9J9EZanlsQkDD0ZP2n/6peDuALQ=="
			crossorigin="anonymous"
			referrerpolicy="no-referrer">
		</script>
		<title>Markdown Test</title>
		<script>
			document.addEventListener("DOMContentLoaded", function () {
				function loadMarkdown() {
					const hash = window.location.hash.substring(2); // Remove "#/"
					const article = hash;
					const filePath = `articles/${article}.md`;

					fetch(filePath)
						.then(response => response.text())
						.then(text => {
							const md = markdownit();
							const result = md.render(text);
							document.body.innerHTML = result;
							// document.getElementById("md").textContent = text;
						})
						.catch(error => console.error("Error loading the markdown file:", error));
				}

				window.addEventListener("hashchange", loadMarkdown);
				loadMarkdown(); // Load on initial page load
			});
		</script>
	</head>
	<body>
		<!-- <p id="md"></p> -->
	</body>
</html>
